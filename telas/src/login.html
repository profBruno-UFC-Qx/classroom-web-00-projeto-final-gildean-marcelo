<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Danny's | Login</title>
  </head>
  <body>
    <div class="conteiner">
      <main class="login-card">
        <header class="header-card">
          <img src="assets/images/logo-dannis.png" alt="Logo Danny's" />
          <h1>Danny's</h1>
          <p>Sanduíches e Sucos</p>
        </header>

        <form action="#">
          <div class="conteiner-input">
            <div class="input-email">
              <label for="email">E-mail</label>
              <input type="email" name="email" id="email" required>
            </div>

            <div class="input-password">
              <label for="password">Senha</label> <input type="password" name="password" id="password" required>
            </div>
          </div>

          <a href="#" class="link-esqueceu">Esqueceu a senha?</a>

          <button class="btn-submit" type="submit">Entrar</button>
        </form>

        <footer class="footer-card">
          Não tem conta? <a href="cadastro.html">Cadastre-se</a>
        </footer>
      </main>
    </div>
  </body>
</html>
