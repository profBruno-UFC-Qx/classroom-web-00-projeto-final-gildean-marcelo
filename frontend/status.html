<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danny's - Status do Pedido</title>

    <link rel="stylesheet" href="src/styles/reset.css">
    <link rel="stylesheet" href="src/styles/style.css">
    <link rel="stylesheet" href="src/styles/status.css">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="header_interno">
            <img src="src/assets/images/logo_simples.png" alt="Danny's Logo" class="header_logo">

            <!-- Navegação Desktop -->
            <nav class="header_nav">
                <a href="index.html" class="header_nav-link">Home</a>
                <a href="#" class="header_nav-link header_nav-link--ativo">Pedidos</a>
                <a href="perfil.html" class="header_nav-link">Perfil</a>
            </nav>

            <button type="button" class="header_cart-btn" aria-label="Carrinho de compras">
                <i class="ph ph-shopping-cart"></i>
            </button>
        </div>
    </header>

    <main class="status-pedido">
        <div class="status-pedido_cabecalho">
            <h1 class="status-pedido_titulo">Pedido #DAN-8492</h1>
            <p class="status-pedido_subtitulo">Realizado hoje às 12:12</p>
        </div>

        <div class="status-pedido_container">
            <!-- Coluna Esquerda -->
            <div class="status-pedido_principal">

                <section class="previsao-card">
                    <h2 class="previsao-card_titulo">Previsão de Entrega</h2>
                    <div class="previsao-card_horario">12:45</div>
                    <div class="previsao-card_badge">
                        <i class="ph-fill ph-clock"></i> 15 - 20 mins
                    </div>
                </section>

                <!-- Rastreio -->
                <section class="rastreio-card">
                    <h2 class="rastreio-card_titulo">Status do Pedido</h2>

                    <ul class="rastreio-timeline">
                        <li class="rastreio-item rastreio-item--concluido">
                            <div class="rastreio-item_icone">
                                <i class="ph-bold ph-check"></i>
                            </div>
                            <div class="rastreio-item_conteudo">
                                <h3 class="rastreio-item_titulo">Pedido Recebido</h3>
                                <p class="rastreio-item_horario">12:15</p>
                            </div>
            </div>
            <div class="stepper-linha">
                <div class="stepper-progresso" id="progress-2"></div>
            </div>
            <div class="stepper-item" id="step-pronto">
                <div class="stepper-icon"><i class="ph-bold ph-moped"></i></div>
                <div class="stepper-content">
                    <h3>A Caminho</h3>
                    <p id="time-pronto">--:--</p>
                </div>
            </div>
        </div>
        </section>

        </div>

        <!-- Coluna Direita -->
        <aside class="status-pedido_lateral">
            <section class="recibo-card">
                <div class="recibo-header">
                    <div class="recibo-id" id="recibo-id">#DAN-0000</div>
                </div>

                <div class="recibo-itens" id="recibo-itens">
                    <!-- Itens inseridos pelo JS -->
                </div>

                <div class="recibo-divisor"></div>

                <div class="recibo-valores">
                    <div class="recibo-linha">
                        <span>Subtotal</span>
                        <span id="recibo-subtotal">R$ 0,00</span>
                    </div>
                    <div class="recibo-linha">
                        <span>Taxa de Entrega</span>
                        <span id="recibo-taxa">R$ 6,00</span>
                    </div>
                </div>

                <div class="recibo-divisor"></div>

                <div class="recibo-total">
                    <span>Total</span>
                    <span id="recibo-total-valor">R$ 0,00</span>
                </div>

                <div class="recibo-acoes">
                    <button type="button" class="btn-recibo btn-recibo--suporte" id="btn-suporte">
                        <i class="ph-bold ph-headset"></i> Falar com Suporte
                    </button>
                    <button type="button" class="btn-recibo btn-recibo--cancelar" id="btn-cancelar">
                        Cancelar Pedido
                    </button>
                </div>
            </section>
        </aside>

        </div>
    </main>

    <!-- Navegação Mobile -->
    <footer class="butao-nav">
        <nav class="butao-nav_menu">
            <a href="index.html" class="butao-nav_item">
                <i class="ph ph-house"></i>
                <span class="butao-nav_label">Home</span>
            </a>
            <a href="#" class="butao-nav_item butao-nav_item--ativo">
                <i class="ph-fill ph-receipt"></i>
                <span class="butao-nav_label">Pedidos</span>
            </a>
            <a href="perfil.html" class="butao-nav_item">
                <i class="ph ph-user"></i>
                <span class="butao-nav_label">Perfil</span>
            </a>
        </nav>
    </footer>

    <script type="module" src="/src/components/statusController.ts"></script>
</body>

</html>
